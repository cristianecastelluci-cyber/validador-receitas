<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FARMASSIS IA</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>💙 FARMASSIS IA</h1>
    <p>Assistente Inteligente do SUS</p>
</header>

<main>

    <!-- 📷 OCR DA RECEITA -->
    <section style="margin:20px 0;">

        <input type="file" id="upload" accept="image/*" capture="environment" style="display:none;">

        <button id="btnCamera">📷 TIRAR FOTO DA RECEITA</button>

        <p id="resultado"></p>

    </section>

    <!-- 💊 MEDICAMENTOS -->
    <section style="margin:20px 0;">

        <h3>💊 Consultar Medicamento</h3>

        <input type="text" id="inputMedicamento" placeholder="Digite o nome do medicamento">

        <button onclick="consultarMedicamento()">🔍 Buscar</button>
        <button onclick="falarMedicamento()">🎤 Falar</button>

        <div id="resultadoMedicamento"></div>

    </section>

    <!-- 🏥 UNIDADES -->
    <section style="margin:20px 0;">

        <button onclick="mostrarUnidades()">🏥 Ver unidades do SUS</button>

        <div id="listaUnidades"></div>

    </section>

    <!-- ⚙️ OUTROS BOTÕES -->
    <section style="margin:20px 0;">

        <button id="voz">🎤 Falar com Assistente</button>
        <button id="libras">🤟 Libras</button>
        <button id="sobre">ℹ️ Sobre</button>

    </section>

</main>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<!-- DADOS -->
<script src="unidadesDispensadoras.js"></script>
<script src="medicamentos.js"></script>

<!-- LÓGICA -->
<script src="app.js"></script>

    <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
    </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
</script>

</body>
</html>
