<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FARMASSIS IA</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f8fb;
        color: #1f2a30;
        font-size: 20px;
    }

    header {
        background: #7fb3d5;
        color: white;
        text-align: center;
        padding: 20px;
    }

    header h1 {
        margin: 0;
        font-size: 26px;
    }

    header p {
        margin: 5px 0 0;
        font-size: 16px;
    }

    .container {
        max-width: 700px;
        margin: auto;
        padding: 15px;
    }

    .card {
        background: white;
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 18px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        border: 1px solid #e3eef5;
    }

    h3 {
        margin-top: 0;
    }

    button {
        width: 100%;
        padding: 18px;
        margin-top: 10px;
        border: none;
        border-radius: 12px;
        font-size: 20px;
        background: #8ecae6;
        color: #0b2a3d;
        font-weight: bold;
    }

    button:hover {
        background: #74b9e0;
    }

    input {
        width: 100%;
        padding: 16px;
        font-size: 18px;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-top: 10px;
    }

    .info {
        margin-top: 10px;
        padding: 15px;
        background: #f3f9fc;
        border-radius: 10px;
        border: 1px solid #e3eef5;
    }

    a {
        color: #2b7bbb;
    }
</style>
</head>

<body>

<header>
    <h1>💙 FARMASSIS IA</h1>
    <p>Assistente de medicamentos do SUS</p>
</header>

<div class="container">

    <!-- CÂMERA -->
    <div class="card">
        <h3>📷 Receita Médica</h3>

        <input type="file" id="upload" accept="image/*" capture="environment" style="display:none;">
        <button id="btnCamera">TIRAR FOTO DA RECEITA</button>

        <div id="resultado" class="info"></div>
    </div>

    <!-- MEDICAMENTO -->
    <div class="card">
        <h3>💊 Consultar Medicamento</h3>

        <input type="text" id="inputMedicamento" placeholder="Digite o nome do remédio">

        <button onclick="consultarMedicamento()">CONSULTAR</button>
        <button id="voz">🎤 FALAR</button>

        <div id="resultadoMedicamento" class="info"></div>
    </div>

    <!-- UNIDADES -->
    <div class="card">
        <h3>🏥 Unidades do SUS</h3>

        <button onclick="mostrarUnidades()">VER UNIDADES</button>

        <div id="listaUnidades" class="info"></div>
    </div>

    <!-- LIBRAS -->
    <div class="card">
        <h3>🤟 Acessibilidade</h3>

        <button id="libras">ATIVAR LIBRAS</button>
        <p style="font-size:16px;">
            Tradução automática em Libras (VLibras)
        </p>
    </div>

</div>

<!-- VLibras -->
<div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
    </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
</script>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<!-- DADOS -->
<script src="unidadesDispensadoras.js"></script>
<script src="medicamentos.js"></script>

<!-- LÓGICA -->
<script src="app.js"></script>

</body>
</html>
